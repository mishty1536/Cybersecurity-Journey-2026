<!DOCTYPE html>
<html>

<head>

    <title>Login System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Login System</h1>

        <label>Email</label>

        <input
            type="email"
            id="email"
            placeholder="Enter Email">

        <label>Password</label>

        <input
            type="password"
            id="password"
            placeholder="Enter Password">

        <div class="checkbox">

            <input
                type="checkbox"
                id="showPassword">

            <label for="showPassword">
                Show Password
            </label>

        </div>

        <button id="loginBtn">

            Login

        </button>

        <p id="message"></p>

    </div>

<script src="script.js"></script>

</body>

</html>
